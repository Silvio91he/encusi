<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EncuSi - Encuadernados Artesanales</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f1ea;
    color: #333;
    text-align: center;
}

/* HEADER CON LOGO + NOMBRE */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 40px 20px;
  background-color: #d8cfc4;
}

.logo {
  max-width: 80px;
  height: auto;
}

.header h1 {
  margin: 0;
  font-size: 2.5rem;
}

.subtitulo {
  margin-top: 10px;
  font-size: 1.2em;
}

/* SECCIONES */
.section {
    padding: 50px 20px;
}

.producto {
    background: white;
    margin: 20px auto;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button {
    background-color: #8b5e3c;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #6f472d;
}
</style>

</head>

<body>

<div class="header">
    <img src="img/logo-color.png" alt="Logo EncuSi" class="logo">
    <h1>EncuSi</h1>
</div>

<p class="subtitulo">Encuadernación artesanal hecha con dedicación</p>

<div class="section">
    <h2>Productos</h2>

    <div class="producto">
        <h3>Cuaderno Personalizado</h3>
        <p>Tapa dura artesanal - 100 hojas</p>
        <button>Consultar por WhatsApp</button>
    </div>

    <div class="producto">
        <h3>Agenda 2026</h3>
        <p>Diseño exclusivo - Edición limitada</p>
        <button>Consultar por WhatsApp</button>
    </div>
</div>

<div class="section">
    <h2>Sobre EncuSi</h2>
    <p>EncuSi nace de la unión entre Encuadernados y Silvio. Cada pieza es hecha a mano con dedicación y detalle.</p>
</div>

</body>
</html>
